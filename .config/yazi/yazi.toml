[manager]
show_hidden = true
sort_by = "natural"
sort_reverse = false
sort_dir_first = true
link_dotted = true
layout = "default"

[preview]
max_width = 800
max_height = 600
ueberzug = true
syntax = true

[opener]
open = [
    { run = 'imv "$@"', desc = "Open with imv", for = "image" },
    { run = 'mpv "$@"', desc = "Open with mpv", for = "video" },
    { run = 'zathura "$@"', desc = "Open with zathura", for = "pdf" },
    { run = 'nvim "$@"', desc = "Open with Neovim", for = "text" },
]

[tabs]
show_icon = true

[theme]
icon_theme = "nerdfont"

[theme.bg]
fg = "#c0caf5"
bg = "#1a1b26"

[theme.status]
fg = "#c0caf5"
bg = "#1f2335"

[theme.input]
fg = "#c0caf5"
bg = "#1f2335"

[theme.select]
fg = "#1a1b26"
bg = "#7aa2f7"

[theme.file]
fg = "#c0caf5"

[theme.dir]
fg = "#7aa2f7"

[theme.symlink]
fg = "#bb9af7"

[theme.blocked]
fg = "#414868"

[theme.hidden]
fg = "#414868"

[theme.cursor]
fg = "#1a1b26"
bg = "#c0caf5"

[theme.cursor_folder]
fg = "#1a1b26"
bg = "#7aa2f7"

[theme.hint]
fg = "#1a1b26"
bg = "#e0af68"

[theme.preview]
fg = "#c0caf5"
bg = "#1a1b26"
